services:

  # ── Nginx – reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - immobilier

  # ── Laravel Octane (RoadRunner) ───────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      MEILISEARCH_HOST: http://meilisearch:7700
      AWS_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:8000/up" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - immobilier

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-immobilier}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-immobilier}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - immobilier

  # ── MeiliSearch ───────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-changeme_master_key_32chars_min!}
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: production
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:7700/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - immobilier

  # ── MinIO (S3-compatible storage) ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_PORT:-9000}:9000" # S3 API  – used in AWS_ENDPOINT / AWS_URL
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Console – http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - immobilier

  # ── MinIO bucket bootstrapper (runs once, exits 0) ────────────────────────────
  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb --ignore-existing local/${AWS_BUCKET:-immobilier} &&
        mc anonymous set download local/${AWS_BUCKET:-immobilier}
      "
    networks:
      - immobilier

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  immobilier:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  meilisearch_data:
  minio_data:
